<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담왕 어드민 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --card2: #FFF3E0;
  --border: #FFD699;
  --primary: #FF6B35;
  --primary-light: rgba(255,107,53,0.1);
  --gold: #F4A017;
  --green: #06D6A0;
  --red: #EF4444;
  --text: #2D2D2D;
  --muted: #9E8C78;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(255,107,53,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nanum Gothic', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 24px 16px;
  background-image: radial-gradient(circle at 10% 10%, rgba(255,217,61,0.1) 0%, transparent 40%);
}
.wrap { max-width: 720px; margin: 0 auto; }

/* 로그인 */
.login-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 28px;
  padding: 48px 36px;
  text-align: center;
  box-shadow: var(--shadow);
  max-width: 400px;
  margin: 80px auto 0;
  position: relative;
  overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, #FF6B35, #FFD93D, #FF9F1C);
}
.login-title { font-family: 'Jua', sans-serif; font-size: 28px; color: var(--text); margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
.login-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Nanum Gothic', sans-serif;
  font-size: 15px;
  font-weight: 700;
  outline: none;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--primary); }
.btn-login {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #FF6B35, #FF9F1C);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'Jua', sans-serif;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,53,0.35);
  transition: all 0.2s;
}
.btn-login:hover { transform: translateY(-2px); }

/* 헤더 */
.admin-header {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 24px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.admin-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #FF6B35, #FFD93D, #FF9F1C);
}
.admin-title { font-family: 'Jua', sans-serif; font-size: 22px; color: var(--text); }
.admin-title span { color: var(--primary); }
.btn-refresh {
  padding: 8px 16px;
  background: var(--primary-light);
  border: 1.5px solid rgba(255,107,53,0.3);
  border-radius: 99px;
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--primary);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-refresh:hover { background: rgba(255,107,53,0.18); }

/* 통계 카드 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 18px 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card-emoji { font-size: 28px; margin-bottom: 6px; }
.stat-card-num {
  font-family: 'Jua', sans-serif;
  font-size: 26px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card-label { font-size: 12px; color: var(--muted); font-weight: 700; }

/* 섹션 */
.section {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.section-title {
  font-family: 'Jua', sans-serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .badge {
  font-size: 12px;
  background: var(--primary-light);
  color: var(--primary);
  border: 1px solid rgba(255,107,53,0.25);
  padding: 2px 10px;
  border-radius: 99px;
}

/* 테이블 */
.rank-table { width: 100%; border-collapse: collapse; }
.rank-table th {
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 1px;
  text-align: left;
  padding: 0 8px 12px;
  border-bottom: 1.5px solid var(--border);
}
.rank-table td {
  padding: 12px 8px;
  border-bottom: 1px solid #FFE0B2;
  font-size: 14px;
  vertical-align: middle;
}
.rank-table tr:last-child td { border-bottom: none; }
.rank-num {
  font-family: 'Jua', sans-serif;
  font-size: 18px;
  color: var(--muted);
  width: 32px;
}
.rank-num.gold { color: #F59E0B; }
.rank-num.silver { color: #94A3B8; }
.rank-num.bronze { color: #B45309; }
.user-name { font-weight: 800; color: var(--text); }
.user-rank-tag {
  font-size: 11px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 99px;
  margin-left: 6px;
}
.pts-val {
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  color: var(--primary);
  font-weight: 800;
}
.gift-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 99px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.gift-status.pending { background: rgba(244,160,23,0.15); color: #B45309; border: 1px solid rgba(244,160,23,0.4); }
.gift-status.done    { background: rgba(6,214,160,0.12); color: #059669; border: 1px solid rgba(6,214,160,0.35); }
.gift-row { background: rgba(255,217,61,0.06); }

/* 로딩 */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(255,249,240,0.9);
  display: none; align-items: center; justify-content: center;
  z-index: 9999;
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  color: var(--primary);
  gap: 10px;
  flex-direction: column;
}
.loading-overlay.show { display: flex; }
.spinner { width: 32px; height: 32px; border: 4px solid #FFE0B2; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap" class="wrap">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:12px">🏆</div>
    <div class="login-title">관리자 대시보드</div>
    <div class="login-sub">비밀번호를 입력해주세요</div>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn-login" onclick="checkPw()">입장하기</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="admin-wrap" class="wrap" style="display:none">
  <div class="admin-header">
    <div class="admin-title">📊 <span>상담왕</span> 관리자</div>
    <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-emoji">👩‍💼</div>
      <div class="stat-card-num" id="stat-total">0</div>
      <div class="stat-card-label">전체 참여자</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-emoji">🎁</div>
      <div class="stat-card-num" id="stat-gift">0</div>
      <div class="stat-card-label">상품권 대상</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-emoji">⭐</div>
      <div class="stat-card-num" id="stat-avg">0</div>
      <div class="stat-card-label">평균 포인트</div>
    </div>
  </div>

  <!-- 상품권 대상자 -->
  <div class="section" id="gift-section" style="display:none">
    <div class="section-title">🎁 상품권 지급 대상 <span class="badge" id="gift-count-badge">0명</span></div>
    <table class="rank-table">
      <thead><tr>
        <th>순위</th><th>이름 / 전화번호</th><th>포인트</th><th>지급</th>
      </tr></thead>
      <tbody id="gift-tbody"></tbody>
    </table>
  </div>

  <!-- 전체 랭킹 -->
  <div class="section">
    <div class="section-title">🏆 전체 포인트 랭킹 <span class="badge" id="rank-count-badge">0명</span></div>
    <table class="rank-table">
      <thead><tr>
        <th>순위</th><th>이름</th><th>직급</th><th>누적 포인트</th>
      </tr></thead>
      <tbody id="rank-tbody"></tbody>
    </table>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span id="loading-msg">불러오는 중...</span>
</div>

<script>
const ADMIN_PW = 'mega2025';
const SB_URL = 'https://nwmtsywdeixlpdtukems.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53bXRzeXdkZWl4bHBkdHVrZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTY0NzYsImV4cCI6MjA5NTUzMjQ3Nn0.8tIDYOyn-L-mxrQAKqBG7Q00R1ZX_DCfBl9EyT3g0Uc';
const HDR = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

const RANKS = [
  { min:0,     emoji:'🌱', title:'신입 상담사',  color:'#22C55E' },
  { min:1000,  emoji:'📋', title:'주임 상담사',  color:'#3B82F6' },
  { min:3000,  emoji:'⭐', title:'베테랑 상담사', color:'#8B5CF6' },
  { min:6000,  emoji:'💎', title:'수석 상담사',  color:'#F59E0B' },
  { min:10000, emoji:'👑', title:'상담의 神',    color:'#EF4444' },
];
function getRank(pts){ return [...RANKS].reverse().find(r=>pts>=r.min)||RANKS[0]; }

// 지급 완료 상태 (로컬 저장)
let giftDone = JSON.parse(localStorage.getItem('giftDone')||'{}');
function saveGift(){ localStorage.setItem('giftDone', JSON.stringify(giftDone)); }

function checkPw(){
  const pw=document.getElementById('pw-input').value;
  if(pw===ADMIN_PW){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('admin-wrap').style.display='block';
    loadData();
  } else {
    alert('비밀번호가 틀렸어요!');
    document.getElementById('pw-input').value='';
  }
}

function showLoading(m){ document.getElementById('loading-msg').textContent=m; document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }

async function loadData(){
  showLoading('데이터 불러오는 중...');
  try {
    const res=await fetch(`${SB_URL}/rest/v1/quiz_results?select=name,phone,points`,{headers:HDR});
    const rows=await res.json();

    // 전화번호별 집계
    const map={};
    rows.forEach(r=>{
      if(!map[r.phone]) map[r.phone]={name:r.name, phone:r.phone, pts:0};
      map[r.phone].pts+=(r.points||0);
    });
    const users=Object.values(map).sort((a,b)=>b.pts-a.pts);

    // 통계
    document.getElementById('stat-total').textContent=users.length;
    document.getElementById('stat-gift').textContent=users.filter(u=>u.pts>=10000).length;
    const avg=users.length?Math.round(users.reduce((s,u)=>s+u.pts,0)/users.length):0;
    document.getElementById('stat-avg').textContent=avg.toLocaleString();
    document.getElementById('rank-count-badge').textContent=users.length+'명';

    // 상품권 대상자
    const giftUsers=users.filter(u=>u.pts>=10000);
    document.getElementById('gift-count-badge').textContent=giftUsers.length+'명';
    if(giftUsers.length>0){
      document.getElementById('gift-section').style.display='block';
      const tbody=document.getElementById('gift-tbody');
      tbody.innerHTML='';
      giftUsers.forEach((u,i)=>{
        const done=giftDone[u.phone];
        const rank=getRank(u.pts);
        const tr=document.createElement('tr');
        tr.className='gift-row';
        tr.innerHTML=`
          <td class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</td>
          <td>
            <div class="user-name">${u.name}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${maskPhone(u.phone)}</div>
          </td>
          <td class="pts-val">${u.pts.toLocaleString()} pts</td>
          <td>
            <button class="gift-status ${done?'done':'pending'}" onclick="toggleGift('${u.phone}',this)">
              ${done?'✅ 지급완료':'🎁 미지급'}
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      document.getElementById('gift-section').style.display='none';
    }

    // 전체 랭킹
    const tbody2=document.getElementById('rank-tbody');
    tbody2.innerHTML='';
    if(users.length===0){ tbody2.innerHTML='<tr><td colspan="4" class="empty">아직 참여자가 없어요 😊</td></tr>'; }
    else {
      users.forEach((u,i)=>{
        const rank=getRank(u.pts);
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
          <td><span class="user-name">${u.name}</span></td>
          <td><span style="font-size:13px;font-weight:800;color:${rank.color}">${rank.emoji} ${rank.title}</span></td>
          <td class="pts-val">${u.pts.toLocaleString()} pts</td>
        `;
        tbody2.appendChild(tr);
      });
    }
  } catch(e){ alert('데이터 로드 실패: '+e.message); }
  hideLoading();
}

function toggleGift(phone, btn){
  if(giftDone[phone]){
    delete giftDone[phone];
    btn.className='gift-status pending';
    btn.textContent='🎁 미지급';
  } else {
    giftDone[phone]=true;
    btn.className='gift-status done';
    btn.textContent='✅ 지급완료';
  }
  saveGift();
  document.getElementById('stat-gift').textContent=Object.keys(giftDone).length;
}

function maskPhone(p){ return p.slice(0,3)+'****'+p.slice(-4); }
</script>
</body>
</html>
