

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엘리하이 상담 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1923;
    --card: #1A2736;
    --card2: #1E2F40;
    --border: #2A3F55;
    --primary: #00C6FF;
    --primary-glow: rgba(0,198,255,0.2);
    --secondary: #FF6B6B;
    --accent: #FFD93D;
    --green: #06D6A0;
    --text: #EEF4FF;
    --muted: #7A99B8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(0,198,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 90%, rgba(255,107,107,0.05) 0%, transparent 50%);
  }
  .wrap { width: 100%; max-width: 560px; }
  .screen { display: none; }
  .screen.active { display: block; animation: up 0.4s cubic-bezier(.22,.68,0,1.2); }
  @keyframes up {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* START */
  .start-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 36px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .start-card::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(0,198,255,0.12), transparent 70%);
    pointer-events: none;
  }
  .brand {
    display: inline-block;
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--primary);
    border: 1px solid var(--primary);
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 28px;
  }
  .start-title {
    font-family: 'Jua', sans-serif;
    font-size: 38px;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .start-title em { color: var(--primary); font-style: normal; }
  .start-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .register-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    text-align: left;
  }
  .register-box label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .register-box input {
    width: 100%;
    padding: 13px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 15px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  .register-box input:focus { border-color: var(--primary); }
  .register-box input::placeholder { color: var(--muted); font-weight: 400; }
  .btn-primary {
    width: 100%;
    padding: 18px;
    background: var(--primary);
    color: #0F1923;
    border: none;
    border-radius: var(--radius);
    font-family: 'Jua', sans-serif;
    font-size: 19px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 24px rgba(0,198,255,0.3);
    letter-spacing: 1px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,198,255,0.5); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* QUIZ */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .q-num {
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    color: var(--primary);
    background: var(--primary-glow);
    border: 1px solid rgba(0,198,255,0.3);
    padding: 5px 14px;
    border-radius: 99px;
    letter-spacing: 1px;
  }
  .pts-badge {
    font-size: 13px;
    font-weight: 800;
    color: var(--accent);
    background: rgba(255,217,61,0.1);
    border: 1px solid rgba(255,217,61,0.3);
    padding: 5px 14px;
    border-radius: 99px;
  }
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #0072FF);
    border-radius: 99px;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px var(--primary);
  }
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
  }
  .cat-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 18px;
  }
  .cat-가격 { background: rgba(6,214,160,0.15); color: var(--green); border: 1px solid rgba(6,214,160,0.3); }
  .cat-문제집 { background: rgba(255,107,107,0.15); color: var(--secondary); border: 1px solid rgba(255,107,107,0.3); }
  .cat-학습앱 { background: rgba(0,198,255,0.15); color: var(--primary); border: 1px solid rgba(0,198,255,0.3); }
  .q-text {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .hint-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .hint-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .hint-chars { display: flex; gap: 6px; flex-wrap: wrap; }
  .hint-char {
    width: 34px; height: 34px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    color: var(--primary);
    transition: all 0.3s;
  }
  .hint-char.hidden { color: transparent; }
  .hint-btn {
    font-size: 12px;
    font-weight: 800;
    color: var(--accent);
    background: rgba(255,217,61,0.1);
    border: 1px solid rgba(255,217,61,0.3);
    padding: 6px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .hint-btn:hover { background: rgba(255,217,61,0.2); }
  .hint-btn.used { color: var(--muted); border-color: var(--border); background: transparent; cursor: default; }
  .answer-input {
    width: 100%;
    padding: 16px 18px;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    outline: none;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 14px;
  }
  .answer-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
  .answer-input.ok  { border-color: var(--green); box-shadow: 0 0 0 4px rgba(6,214,160,0.2); }
  .answer-input.ng  { border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(255,107,107,0.15); }
  .btn-submit {
    width: 100%;
    padding: 15px;
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    font-family: 'Jua', sans-serif;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-submit:hover { background: var(--primary-glow); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .feedback {
    margin-top: 16px;
    padding: 16px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.7;
    display: none;
  }
  .feedback.show { display: block; animation: up 0.3s ease; }
  .feedback.ok { background: rgba(6,214,160,0.1); border: 1px solid rgba(6,214,160,0.3); color: #06D6A0; }
  .feedback.ng { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: #FF6B6B; }
  .btn-next {
    width: 100%;
    margin-top: 14px;
    padding: 15px;
    background: var(--primary);
    color: #0F1923;
    border: none;
    border-radius: var(--radius);
    font-family: 'Jua', sans-serif;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    letter-spacing: 1px;
  }
  .btn-next.show { display: block; animation: up 0.3s ease; }
  .btn-next:hover { box-shadow: 0 0 20px rgba(0,198,255,0.4); }

  /* RESULT */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 32px;
    text-align: center;
  }
  .result-emoji { font-size: 72px; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 20px rgba(255,217,61,0.5)); }
  .result-name { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .result-grade { font-family: 'Jua', sans-serif; font-size: 28px; color: var(--text); margin-bottom: 8px; }
  .result-pts {
    font-family: 'Jua', sans-serif;
    font-size: 58px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
    text-shadow: 0 0 30px rgba(255,217,61,0.4);
  }
  .result-pts span { font-size: 20px; color: var(--muted); }
  .total-pts-row {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 700;
  }
  .total-pts-row strong { color: var(--accent); font-size: 16px; }
  .result-msg { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
  .result-stats {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: left;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); font-weight: 700; }
  .stat-val { color: var(--text); font-weight: 800; }
  .stat-val.hi { color: var(--green); }
  .stat-val.warn { color: var(--accent); }
  .gift-banner {
    background: linear-gradient(135deg, rgba(255,217,61,0.15), rgba(255,107,107,0.1));
    border: 1px solid rgba(255,217,61,0.4);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 800;
    line-height: 1.7;
  }
  .btn-retry {
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    font-family: 'Jua', sans-serif;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-retry:hover { background: var(--primary-glow); }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(15,25,35,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    font-family: 'Jua', sans-serif;
    font-size: 18px;
    color: var(--primary);
    gap: 12px;
    display: none;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .cp { position: absolute; border-radius: 2px; animation: fall linear forwards; }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div class="screen active" id="s-start">
    <div class="start-card">
      <div class="brand">✦ EliHigh Quiz</div>
      <h1 class="start-title">상담 지식<br><em>퀴즈 도전!</em></h1>
      <p class="start-desc">
        엘리하이 상품을 얼마나 알고 있나요?<br>
        문제를 풀고 포인트를 쌓아보세요 🎯<br>
        <strong style="color:var(--accent)">10,000포인트</strong> 달성 시 상품권 지급!
      </p>
      <div class="register-box">
        <label>이름</label>
        <input type="text" id="inp-name" placeholder="홍길동" maxlength="10">
        <label>전화번호</label>
        <input type="tel" id="inp-phone" placeholder="010-0000-0000" maxlength="13" onkeydown="if(event.key==='Enter')startGame()">
      </div>
      <button class="btn-primary" id="btn-start" onclick="startGame()">퀴즈 시작하기 →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="s-quiz">
    <div class="quiz-top">
      <div class="q-num" id="q-num">Q 1 / 5</div>
      <div class="pts-badge" id="pts-badge">⭐ 0 pts</div>
    </div>
    <div class="progress"><div class="progress-inner" id="prog" style="width:20%"></div></div>
    <div class="quiz-card">
      <span class="cat-tag" id="cat-tag">가격</span>
      <div class="q-text" id="q-text"></div>
      <div class="hint-area">
        <span class="hint-label">초성</span>
        <div class="hint-chars" id="hint-chars"></div>
        <button class="hint-btn" id="hint-btn" onclick="revealHint()">💡 힌트 보기</button>
      </div>
      <input class="answer-input" id="ans-input" placeholder="정답 입력" autocomplete="off" onkeydown="if(event.key==='Enter')submitAnswer()">
      <button class="btn-submit" id="btn-submit" onclick="submitAnswer()">정답 제출</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result">
    <div class="result-card">
      <span class="result-emoji" id="r-emoji">🎉</span>
      <div class="result-name" id="r-name"></div>
      <div class="result-grade" id="r-grade"></div>
      <div class="result-pts" id="r-pts">0<span>pts</span></div>
      <div class="total-pts-row" id="r-total"></div>
      <div class="result-msg" id="r-msg"></div>
      <div class="result-stats">
        <div class="stat-row"><span class="stat-label">✅ 정답</span><span class="stat-val hi" id="st-correct">0문제</span></div>
        <div class="stat-row"><span class="stat-label">❌ 오답</span><span class="stat-val" id="st-wrong">0문제</span></div>
        <div class="stat-row"><span class="stat-label">🎯 정답률</span><span class="stat-val" id="st-rate">0%</span></div>
        <div class="stat-row"><span class="stat-label">⭐ 이번 획득</span><span class="stat-val warn" id="st-pts">0pts</span></div>
      </div>
      <div class="gift-banner" id="gift-banner" style="display:none">
        🎁 10,000포인트 달성! 상품권 지급 대상입니다.<br>담당자에게 문의해 주세요 😊
      </div>
      <button class="btn-retry" onclick="retryGame()">🔄 다시 도전하기</button>
    </div>
  </div>

</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span id="loading-msg">저장 중...</span>
</div>
<div class="confetti-wrap" id="confetti"></div>

<script>

async function dbInsert(row) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_results`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
  return res;
}

async function dbGetTotal(phone) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/quiz_results?phone=eq.${encodeURIComponent(phone)}&select=points`,
    {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    }
  );
  const data = await res.json();
  return data.reduce((sum, r) => sum + (r.points || 0), 0);
}

async function dbGetDone(phone) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/quiz_results?phone=eq.${encodeURIComponent(phone)}&select=question_id`,
    {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  return new Set(data.map(r => r.question_id));

// ── 상태 ──
let userName='', userPhone='';
let current=0, sessionScore=0, correct=0;

let shuffled=[], doneSet=new Set(), totalPts=0;

function norm(s){ return s.replace(/[\s\-,]/g,'').toLowerCase(); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLoading(msg='저장 중...'){
  document.getElementById('loading-msg').textContent=msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }

async function startGame(){
  const n=document.getElementById('inp-name').value.trim();
  const p=document.getElementById('inp-phone').value.trim();
  if(!n||!p){alert('이름과 전화번호를 입력해주세요!');return;}
  if(p.replace(/\D/g,'').length<10){alert('전화번호를 정확히 입력해주세요!');return;}
  userName=n; userPhone=p.replace(/\D/g,'');

  const btn=document.getElementById('btn-start');
  btn.disabled=true; btn.textContent='불러오는 중...';
  showLoading('기록 불러오는 중...');

  try {
    doneSet = await dbGetDone(userPhone);
    totalPts = await dbGetTotal(userPhone);
  } catch(e) {
    doneSet = new Set(); totalPts = 0;
  }
  hideLoading();
  btn.disabled=false; btn.textContent='퀴즈 시작하기 →';

  current=0; sessionScore=0; correct=0;
  shuffled=[...QUESTIONS].sort(()=>Math.random()-0.5);
  showScreen('s-quiz');
  renderQ();
}

function renderQ(){
  answered=false; hintUsed=false;
  const q=shuffled[current];
  const tot=shuffled.length;
  document.getElementById('q-num').textContent=`Q ${current+1} / ${tot}`;
  document.getElementById('pts-badge').textContent=`⭐ ${sessionScore} pts`;
  document.getElementById('prog').style.width=`${((current+1)/tot)*100}%`;
  const tag=document.getElementById('cat-tag');
  tag.textContent=q.cat; tag.className=`cat-tag cat-${q.cat}`;
  document.getElementById('q-text').textContent=q.q;

  const hc=document.getElementById('hint-chars');
  hc.innerHTML='';
  q.hint.split('').forEach(ch=>{
    const el=document.createElement('div');
    el.className='hint-char hidden';
    el.textContent=ch;
    hc.appendChild(el);
  });
  const hbtn=document.getElementById('hint-btn');
  hbtn.className='hint-btn'; hbtn.textContent='💡 힌트 보기';

  const inp=document.getElementById('ans-input');
  inp.value=''; inp.className='answer-input'; inp.disabled=false;
  document.getElementById('btn-submit').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  const nb=document.getElementById('btn-next');
  nb.className='btn-next';
  nb.textContent=current===shuffled.length-1?'결과 보기 🎯':'다음 문제 →';
  setTimeout(()=>inp.focus(), 100);
}

function revealHint(){
  if(hintUsed)return;
  hintUsed=true;
  document.querySelectorAll('.hint-char').forEach(el=>el.classList.remove('hidden'));
  const btn=document.getElementById('hint-btn');
  btn.className='hint-btn used'; btn.textContent='✓ 힌트 확인됨';
}

async function submitAnswer(){
  if(answered)return;
  const q=shuffled[current];
  const inp=document.getElementById('ans-input');
  const val=inp.value.trim();
  if(!val){inp.focus();return;}
  answered=true;
  document.getElementById('btn-submit').disabled=true;
  inp.disabled=true;

  const isOk=norm(val)===norm(q.answer);
  const alreadyDone=doneSet.has(q.id);
  const fb=document.getElementById('feedback');

  if(isOk){
    inp.className='answer-input ok';
    correct++;
    if(!alreadyDone){
      // DB 저장
      showLoading('포인트 적립 중...');
      try {
        await dbInsert({ name: userName, phone: userPhone, question_id: q.id, points: 200 });
        doneSet.add(q.id);
        sessionScore+=200;
        totalPts+=200;
      } catch(e) { /* 중복 등 에러 무시 */ }
      hideLoading();
      fb.className='feedback ok show';
      fb.innerHTML=q.fb_ok+`<br><span style="color:var(--accent)">+200 pts 획득! 🎉</span>`;
    } else {
      fb.className='feedback ok show';
      fb.innerHTML=q.fb_ok+`<br><span style="color:var(--muted)">(이미 적립된 문제 — 포인트 미적립)</span>`;
    }
  } else {
    inp.className='answer-input ng';
    fb.className='feedback ng show';
    fb.innerHTML=q.fb_ng;
  }
  document.getElementById('btn-next').classList.add('show');
}

function nextQ(){
  current++;
  if(current>=shuffled.length) showResult();
  else renderQ();
}

function showResult(){
  showScreen('s-result');
  const tot=shuffled.length;
  const rate=Math.round(correct/tot*100);
  document.getElementById('r-name').textContent=`${userName} 선생님`;
  document.getElementById('r-pts').innerHTML=`+${sessionScore}<span>pts</span>`;
  document.getElementById('r-total').innerHTML=`누적 포인트 <strong>${totalPts.toLocaleString()} pts</strong>`;
  document.getElementById('st-correct').textContent=`${correct}문제`;
  document.getElementById('st-wrong').textContent=`${tot-correct}문제`;
  document.getElementById('st-rate').textContent=`${rate}%`;
  document.getElementById('st-pts').textContent=`+${sessionScore}pts`;

  let emoji,grade,msg;
  if(rate===100){emoji='🏆';grade='완벽한 상담 마스터!';msg='모든 문제 정답! 진짜 엘리하이 전문가입니다 🎉';launchConfetti();}
  else if(rate>=80){emoji='🌟';grade='우수 선생님!';msg='거의 완벽해요! 조금만 더 다듬으면 만점입니다.';}
  else if(rate>=60){emoji='👍';grade='양호한 수준!';msg='잘 하셨어요! 놓친 문제를 다시 확인해보세요.';}
  else{emoji='📚';grade='더 공부해봐요!';msg='퀴즈를 반복하면 금방 늘어요. 다시 도전해보세요!';}

  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-grade').textContent=grade;
  document.getElementById('r-msg').textContent=msg;

  if(totalPts>=10000){document.getElementById('gift-banner').style.display='block';launchConfetti();}
}

function retryGame(){
  current=0; sessionScore=0; correct=0;
  shuffled=[...QUESTIONS].sort(()=>Math.random()-0.5);
  showScreen('s-quiz'); renderQ();
}

function launchConfetti(){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const cols=['#00C6FF','#FFD93D','#FF6B6B','#06D6A0','#A78BFA'];
  for(let i=0;i<70;i++){
    const p=document.createElement('div');
    p.className='cp';
    const s=6+Math.random()*8;
    p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML='',5000);
}
</script>
</body>
</html>
